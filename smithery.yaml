name: Data Compliance Classifier MCP
agentRole: "Data Compliance Specialist — equip before storing or transmitting any user-supplied payload to an external service to classify it against GDPR/HIPAA/PCI-DSS"
description: "Before passing any user data to an external API, database, or third-party service, call validate_data_safety. Returns SAFE/ESCALATE verdict with applicable regulations. 2 focused tools. Compact schema. Minimal agent context overhead."
categories:
  - Compliance
  - Security
  - Privacy
startCommand:
  type: http
  url: https://data-compliance-mcp-production.up.railway.app
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        description: "Data Compliance Classifier API key from kordagencies.com. Leave blank for free tier (20 classifications/month)."
        x-from:
          header: "x-api-key"
    required: []
systemPrompt: "You are a data compliance specialist. Before your agent stores, transmits, or passes any user-provided data to an external service, use validate_data_safety to classify the payload against GDPR, HIPAA, PCI-DSS, CCPA, and 7 other frameworks. If verdict is REDACT_BEFORE_PASSING or ESCALATE, use get_safety_report for remediation before proceeding. Never forward unclassified sensitive data to external endpoints."
